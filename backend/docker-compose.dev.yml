services:
  postgres:
    image: postgres:16-alpine
    container_name: iphigenai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iphigenai
    ports:
      - "5432:5432"
    volumes:
      - iphigenai-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    container_name: iphigenai-mongo
    ports:
      - "27017:27017"
    volumes:
      - iphigenai-mongo:/data/db

  redis:
    image: redis:7-alpine
    container_name: iphigenai-redis
    ports:
      - "6379:6379"
    volumes:
      - iphigenai-redis:/data

volumes:
  iphigenai-pg:
  iphigenai-mongo:
  iphigenai-redis:
